# Render Blueprint — HostelLo web service (Dev B infra deliverable).
# DB lives on Neon (permanent free tier), not Render Postgres (90-day expiry).
services:
  - type: web
    name: hostello
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Single worker is mandatory: in-memory OTP store + free-tier RAM (HLD §7.3)
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        sync: false # paste the Neon connection string in the dashboard
      - key: CLOUDINARY_URL
        sync: false # paste from the Cloudinary dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: "production"
      - key: ALLOWED_HOSTS
        sync: false # set to the Render hostname, e.g. hostello.onrender.com
      # Mock providers are DISABLED in production. A real SMS/KYC integration must
      # be wired before login is functional (see DEPLOY.md). Never set these "true"
      # on a public deploy — it makes "123456" a universal login.
      - key: MOCK_OTP
        value: "false"
      - key: MOCK_KYC
        value: "false"
      - key: W_PRICE
        value: "0.40"
      - key: W_LOCATION
        value: "0.40"
      - key: W_AMENITY
        value: "0.20"
      - key: BUDGET_SLACK
        value: "500.00"
      - key: CLEAN_BAND
        value: "1"
      - key: PREMIUM_BOOST
        value: "1.15"
      - key: VERIFIED_BOOST
        value: "0.05"
